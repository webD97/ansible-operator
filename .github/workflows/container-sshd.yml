# Build-validate the managed-ssh proxy image whenever Containerfile.sshd changes — on PRs and after
# merge to main. This never pushes or signs; releases are cut separately by release-sshd.yml on
# `sshd-v*` tags. Keeping the release trigger out of this file avoids the GitHub gotcha where a
# `paths` filter combined with a `tags` trigger evaluates the (empty) tag-push diff and skips the run.
#
# NOTE: because this job is `paths`-filtered it will not report on PRs that don't touch the file, so it
# must NOT be configured as a required status check (that would block unrelated PRs indefinitely).
name: Build sshd proxy image

on:
  pull_request:
    paths:
      - "Containerfile.sshd"
      - ".github/workflows/container-sshd.yml"
  push:
    branches: ["main"]
    paths:
      - "Containerfile.sshd"
      - ".github/workflows/container-sshd.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: Containerfile.sshd
          context: .
          push: false
