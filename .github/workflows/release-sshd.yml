# Release the managed-ssh proxy image on its OWN tag cadence, independent of the operator's `v*.*.*`
# releases — an operator release never publishes this image, and vice versa.
#
# Tag scheme: `sshd-v<OPENSSH_VERSION>-<REVISION>`, e.g. `sshd-v10.4p1-1` — the image tag reflects the
# OpenSSH version baked into Containerfile.sshd, plus an integer revision bumped when the image is
# rebuilt WITHOUT an OpenSSH change (Alpine base bump, Containerfile fix). A "verify" step below fails
# the release unless the tag's OpenSSH version matches the Containerfile's `ARG OPENSSH_VERSION`.
#
# On such a tag this builds + pushes + cosign-signs the image (tags `<ver>-<rev>`, floating `<ver>`,
# `latest`), then opens a PR repinning the chart + example config onto the `@sha256:` digest
# (THREAT_MODEL T-ESC-5 / R5).
name: Release sshd proxy image

on:
  push:
    # Broad `sshd-v*` (not `sshd-v*.*.*`): the OpenSSH version isn't semver (`10.4p1`). The verify step
    # enforces the real shape. Still disjoint from the operator's `v*.*.*` tags.
    tags: ["sshd-v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-sshd

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via Fulcio
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v7

      # The tag must reflect what the image actually builds: `sshd-v<openssh>-<rev>` where <openssh>
      # equals Containerfile.sshd's ARG OPENSSH_VERSION. Fail the release on a mismatch or bad shape.
      - name: Verify tag OpenSSH version matches the Containerfile
        run: |
          set -euo pipefail
          built="$(grep -oP 'ARG OPENSSH_VERSION=\K\S+' Containerfile.sshd)"
          rest="${GITHUB_REF_NAME#sshd-v}"        # e.g. 10.4p1-1
          case "$rest" in
            *-*) tag_ver="${rest%-*}"; rev="${rest##*-}" ;;
            *)   echo "::error::tag '${GITHUB_REF_NAME}' must be sshd-v<openssh>-<revision>, e.g. sshd-v${built}-1"; exit 1 ;;
          esac
          case "$rev" in ''|*[!0-9]*) echo "::error::revision '$rev' must be an integer"; exit 1 ;; esac
          if [ "$tag_ver" != "$built" ]; then
            echo "::error::tag OpenSSH version '$tag_ver' != Containerfile ARG OPENSSH_VERSION '$built'"
            exit 1
          fi

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0
        with:
          cosign-release: "v2.2.4"

      - uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # OCI references must be all lowercase, but `github.repository` can be mixed-case — normalise it.
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo "${REGISTRY}/${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # `sshd-v10.4p1-1` -> image tags `10.4p1-1` (exact), `10.4p1` (floating, newest rev of that
      # OpenSSH version) and `latest`. `version` output (first tag) is the exact `10.4p1-1`.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=match,pattern=sshd-v(.+),group=1
            type=match,pattern=sshd-v(\d+\.\d+p\d+)-\d+,group=1
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: Containerfile.sshd
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sign the published image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  # Open a PR that pins the chart + example config to the immutable digest just published. Kept as a PR
  # (not a direct push) so a human reviews the bump; it touches no Containerfile, so it does not
  # retrigger the sshd build. Requires the repo setting "Allow GitHub Actions to create and approve
  # pull requests".
  pin-chart:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Base the PR on main, not the pushed tag.
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Repin the proxy image to the released digest
        env:
          IMAGE: ${{ needs.build.outputs.image }} # already lowercased in the build job
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${IMAGE}@${DIGEST}"
          # Line-targeted edits only — no yq / no reserialization — so surrounding whitespace, blank
          # lines and comments are preserved. proxyImage.{repository,tag} are the only 4-space-indented
          # such keys; the top-level image.{repository,tag} are 2-space and left untouched.
          sed -i -E \
            -e "s|^(    repository:).*|\1 ${REF}|" \
            -e 's|^(    tag:).*|\1 ""|' \
            chart/values.yaml
          # Example config: proxy_image is required there too — keep it pinned to the same digest.
          sed -i -E "s|^proxy_image = .*|proxy_image = \"${REF}\"|" config.example.toml

      - name: Open pin PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/pin-sshd-${{ needs.build.outputs.version }}
          title: "chore: pin managed-ssh proxy image to ${{ needs.build.outputs.version }}"
          commit-message: "chore: pin managed-ssh proxy image to ${{ needs.build.outputs.version }}"
          body: |
            Automated by `release-sshd.yml` after publishing
            `${{ needs.build.outputs.image }}:${{ needs.build.outputs.version }}`.

            Pins the managed-ssh proxy image to the signed, immutable digest
            `${{ needs.build.outputs.digest }}` in both `chart/values.yaml` (`managedSsh.proxyImage`)
            and `config.example.toml` (`proxy_image`).
          labels: dependencies
