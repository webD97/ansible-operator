apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: playbookplans.ansible.cloudbending.dev
spec:
  group: ansible.cloudbending.dev
  names:
    categories: []
    kind: PlaybookPlan
    plural: playbookplans
    shortNames: []
    singular: playbookplan
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.suspend
      name: Suspended
      type: boolean
    - jsonPath: .status.lastTriggeredRun
      name: Previous run
      type: string
    - jsonPath: .status.nextRun
      name: Next run
      type: string
    - jsonPath: .status.currentHash
      name: Current hash
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Running")].status
      name: Running
      type: string
    - jsonPath: .status.summary
      name: Summary
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for PlaybookPlanSpec via `CustomResource`
        properties:
          spec:
            properties:
              failedPlaysHistoryLimit:
                description: |-
                  How many failed (or outcome-unknown) `Play` history records to keep for this plan. Kept
                  larger than the successful limit so failures stay visible longer. Defaults to 10.
                minimum: 0.0
                nullable: true
                type: integer
              image:
                description: An OCI image with Ansible and all required collections
                type: string
              inventoryRefs:
                description: These host groups will be available in our playbook
                items:
                  properties:
                    clusterInventory:
                      description: Name of the ClusterInventory resource being referenced
                      nullable: true
                      type: string
                    staticInventory:
                      description: Name of the StaticInventory resource being referenced
                      nullable: true
                      type: string
                  type: object
                type: array
              mode:
                default: OneShot
                description: Controls if a playbook is executed once or repeatedly
                enum:
                - OneShot
                - Recurring
                type: string
              schedule:
                description: 5-part cron expression that tells at which time the playbook may execute
                nullable: true
                type: string
              serviceAccountName:
                description: |-
                  ServiceAccount the playbook pod runs as, letting tasks reach the Kubernetes API with that
                  identity's RBAC. When set, the SA's token is auto-mounted (Ansible's `kubernetes.core`
                  modules pick it up via in-cluster config). When unset, the pod runs with no API token at
                  all — create the ServiceAccount and its Role/RoleBinding yourself and name it here.
                nullable: true
                type: string
              startingDeadlineSeconds:
                description: |-
                  Grace window, in seconds, after a scheduled tick during which a run may still start. The
                  operator evaluates the schedule on a requeue rather than exactly on the tick, so this
                  absorbs the gap between a tick and the next reconcile (e.g. the operator was busy or
                  restarting). If more than this many seconds pass past a tick without the run starting, that
                  tick is skipped and the run waits for the next one. The same idea as a CronJob's
                  `.spec.startingDeadlineSeconds`. Only affects scheduled (`schedule`) plans. Defaults to 30.
                minimum: 0.0
                nullable: true
                type: integer
              successfulPlaysHistoryLimit:
                description: |-
                  How many successful `Play` history records to keep for this plan before the oldest are
                  pruned. Unlike the Job's short TTL, Plays are the durable run history. Defaults to 3.
                minimum: 0.0
                nullable: true
                type: integer
              suspend:
                default: false
                description: |-
                  When true, the operator stops starting new runs for this plan — the same idea as a
                  CronJob's `.spec.suspend`. A run already in progress is left to finish; only the *starting*
                  of new runs is gated. While suspended the `Suspended` printer column reads `true` and
                  `.status.nextRun` is cleared; the plan's phase keeps reflecting its underlying state.
                  Defaults to false.
                type: boolean
              template:
                description: The playbook will be built from this, some fields will be set automatically (vars, hosts)
                properties:
                  files:
                    description: Files for the playbook
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    nullable: true
                    type: array
                  playbook:
                    description: The actual playbook contents
                    type: string
                  requirements:
                    description: Runtime requirements (e.g. Ansible collections)
                    nullable: true
                    type: string
                  variables:
                    description: Variables for the playbook
                    items:
                      anyOf:
                      - required:
                        - secretRef
                      - required:
                        - inline
                      properties:
                        inline:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        secretRef:
                          properties:
                            name:
                              type: string
                          required:
                          - name
                          type: object
                      type: object
                    nullable: true
                    type: array
                required:
                - playbook
                type: object
              timeZone:
                description: Time zone for the _schedule_ field, if unset UTC is assumed
                nullable: true
                type: string
              ttlSecondsAfterFinished:
                description: |-
                  How long a finished run's Job (and its pod) is kept before Kubernetes' TTL controller
                  reaps it. The operator never deletes the Job itself, so this governs the ansible pod's
                  lifetime. Values below 60 seconds are silently raised to 60; unset uses the operator's
                  default.
                format: int32
                nullable: true
                type: integer
            required:
            - image
            - inventoryRefs
            - template
            type: object
          status:
            nullable: true
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      nullable: true
                      type: string
                    message:
                      nullable: true
                      type: string
                    reason:
                      nullable: true
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
              currentHash:
                type: string
              currentJobName:
                description: |-
                  Name of the Job backing the currently-`Applying` run, if any. Looked up by name rather
                  than the `PLAYBOOKPLAN_HASH` label alone, since that label is stable across every retry
                  of an unchanged spec and could match an older, already-finished retry's Job.
                nullable: true
                type: string
              eligibleHosts:
                items:
                  properties:
                    hosts:
                      items:
                        type: string
                      type: array
                    name:
                      type: string
                  required:
                  - hosts
                  - name
                  type: object
                type: array
              hostsStatus:
                additionalProperties:
                  properties:
                    lastAppliedHash:
                      description: The execution hash last SUCCESSFULLY applied to this host. Only bumped on `HostOutcome::Succeeded`.
                      type: string
                    lastOutcome:
                      enum:
                      - Succeeded
                      - Failed
                      - Unknown
                      - NotReached
                      type: string
                    lastTransitionTime:
                      nullable: true
                      type: string
                  required:
                  - lastAppliedHash
                  - lastOutcome
                  type: object
                nullable: true
                type: object
              lastRenderedGeneration:
                format: int64
                nullable: true
                type: integer
              lastTriggeredRun:
                description: |-
                  The start of the schedule slot (`Timing::Now`'s window start) that a run was last started
                  for. The trigger gate compares the current slot against this so a run that completes inside
                  its grace window isn't immediately re-triggered by the next reconcile within that same
                  window. Reset whenever `current_hash` changes; `None` for unscheduled plans (no slot to
                  dedupe against).
                nullable: true
                type: string
              nextRun:
                nullable: true
                type: string
              phase:
                enum:
                - Pending
                - Delayed
                - Applying
                - Scheduled
                - Failed
                - Succeeded
                - UnauthorizedNamespace
                type: string
              retryCount:
                description: |-
                  How many Jobs have been created for `current_hash` so far, including the current one —
                  distinguishes retries in the Job name (`apply-{plan}-{shortid}-{n}`). Reset to 0 whenever
                  `current_hash` changes; incremented once per Job actually created, in `spawn_ansible_job`.
                minimum: 0.0
                type: integer
              summary:
                nullable: true
                type: string
            required:
            - conditions
            - currentHash
            - eligibleHosts
            - phase
            - retryCount
            type: object
        required:
        - spec
        title: PlaybookPlan
        type: object
    served: true
    storage: true
    subresources:
      status: {}
