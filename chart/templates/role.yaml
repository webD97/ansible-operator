{{- /*
Namespaced permissions, rendered once per ENROLLED namespace = the operator's own namespace
(.Release.Namespace, always enrolled) plus every entry in .Values.watchNamespaces. This is the R1
enforcement boundary: the operator can read/write Secrets and create Jobs ONLY in these namespaces.

Every enrolled namespace gets the "plan-serving" rules (Secret/Job/Pod access for a run). The
operator's OWN namespace additionally gets the managed-ssh infra rules (Leases, proxy pods,
NetworkPolicies, and cleanup of per-run cert Secrets) — those resources only ever exist there.
*/ -}}
{{- $namespaces := concat (.Values.watchNamespaces | default list) (list .Release.Namespace) | uniq }}
{{- range $ns := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "chart.fullname" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "chart.labels" $ | nindent 4 }}
rules:
  # Plan-serving grants (R1) — scoped to enrolled namespaces only:
  #  - the workspace Secret is created/patched here and variable/file Secrets are read here;
  #  - one Job per run is created + watched here;
  #  - the run's Job-owned pod is read here for its termination message.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  {{- if eq $ns $.Release.Namespace }}
  # Operator-namespace-only infra. Leases, managed-ssh proxy pods, their NetworkPolicies, and
  # cleanup (delete/deletecollection) of per-run cert Secrets only ever exist in the operator's own
  # namespace, so these are NOT granted in tenant namespaces.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "deletecollection"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["delete", "deletecollection"]
  {{- end }}
{{- end }}
