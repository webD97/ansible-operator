apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # The operator reads this at startup (mounted at /etc/ansible-operator/config.toml). It is NOT
  # hot-reloaded: a change here rolls the Deployment via the checksum/config pod annotation
  # (see deployment.yaml), and the restarted process picks up the new config.
  config.toml: |
    # Enrolled tenant namespaces the operator may read/write Secrets and create Jobs in (R1). The
    # operator's own namespace ({{ .Release.Namespace }}) is ALWAYS enrolled implicitly by the
    # operator, so it does not need to be listed here.
    watch_namespaces = [
    {{- range (.Values.watchNamespaces | default list) }}
      {{ . | quote }},
    {{- end }}
    ]
    {{- with .Values.managedSsh }}{{ with .proxyImage }}{{ if .repository }}
    # Image for the node-root managed-ssh proxy pods (THREAT_MODEL T-ESC-5). The sshd image is released
    # on its own `sshd-v*` cadence, so pin it explicitly: a `tag`, or a `@sha256:` digest in
    # `repository` with an empty `tag` (the production path the release workflow's PR converges onto).
    proxy_image = {{ printf "%s%s" .repository (ternary (printf ":%s" (.tag | toString)) "" (ne (.tag | toString) "")) | quote }}
    {{- end }}{{ end }}{{ end }}
    {{- with (.Values.managedSsh).readiness }}

    # Adaptive readiness grace for managed-ssh proxy pods on NotReady nodes: wait `grace_seconds`,
    # divided by `aggressiveness` at each `threshold_days` boundary, then give up (report unreachable).
    [managed_ssh]
    grace_seconds = {{ .graceSeconds | int }}
    aggressiveness = {{ .aggressiveness | int }}
    threshold_days = [{{ range $i, $d := .thresholdDays }}{{ if $i }}, {{ end }}{{ $d | int }}{{ end }}]
    {{- end }}
