# Example ansible-operator configuration for LOCAL DEVELOPMENT.
#
# In-cluster this file is rendered by the Helm chart into a ConfigMap and mounted at the default
# path /etc/ansible-operator/config.toml. For local runs, copy this file and point the operator at
# it via the --config flag:
#
#   cp config.example.toml config.toml
#   POD_NAMESPACE=ansible-system cargo run -- run --config ./config.toml
#
# POD_NAMESPACE is required separately (the operator's own namespace, normally injected via the
# Downward API in-cluster) and is ALWAYS enrolled implicitly — you do not list it below.
#
# `proxy_image` (below) is REQUIRED: there is no built-in default for the node-root proxy image, so
# the operator refuses to start without it. `watch_namespaces` still defaults to empty (serve only
# POD_NAMESPACE).

# Enrolled tenant namespaces (R1 / THREAT_MODEL T-INFO-1): the only namespaces the operator may
# read/write Secrets and create Jobs in, on top of POD_NAMESPACE. A PlaybookPlan created anywhere
# else is refused with status.phase = UnauthorizedNamespace.
#
# Empty ([]) => serve only the operator's own namespace.
watch_namespaces = [
  "default",
  # "team-a",
  # "team-b",
]

# Image for the managed-ssh proxy pods scheduled onto target nodes (the node-root primitive —
# THREAT_MODEL T-ESC-5). REQUIRED — the operator will not start without it, and there is no built-in
# default. Tag is <openssh>-<revision> (e.g. 10.4p1-1). Pin to a digest in production (repo@sha256:…);
# the release workflow keeps this line pinned to the current signed image.
proxy_image = "ghcr.io/webd97/ansible-operator-sshd@sha256:bd32bc1aaf89d110a5e5098977c5b41018c9134eef57d9ec14c42ac3fb959f38"

# How long the operator waits for a NotReady node's managed-ssh proxy pod to become Ready before it
# gives up on that node for the run (Ansible then reports the node unreachable, and it is retried on
# the next run). The wait applies only to a pod stuck before Running; a pod that has reached Running
# is waited on until Ready as usual. It scales with how long the node has been silent (its last Ready
# heartbeat): the full `grace_seconds` when the last heartbeat is within `threshold_days[0]`, divided
# by `aggressiveness` again at each further threshold, and 0 (given up at once) past the last one.
#
# The whole table is optional; omit it for the defaults below (600 / 300 / 150 / 0 seconds at the
# 3 / 7 / 30 day boundaries).
[managed_ssh]
grace_seconds = 600
aggressiveness = 2
threshold_days = [3, 7, 30]
